<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống quản lý</title>
    <link rel="stylesheet" href="/css/signUp.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <header class="header">
                <h1>Đăng ký tài khoản</h1>
                <p>Đăng ký tài khoản để sử dụng dịch vụ</p>
            </header>

            <form id="register-form" novalidate>
                <div id="registerMessage" class="message"></div>

                <div class="name-group">
                    <div class="input-group">
                        <label>Họ và tên đệm</label>
                        <input type="text" id="midName" placeholder="Nhập họ và tên đệm">
                    </div>

                    <div class="input-group">
                        <label>Tên</label>
                        <input type="text" id="lastName" placeholder="Nhập tên">
                    </div>
                </div>


                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@company.com">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="reg-terms">
                        <span>Bạn đồng ý với <a href="./terms.html">chính sách và điều khoản</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Đăng ký</button>

                <div class="switch-link">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/signUp.js"></script>
</body>

</html>
